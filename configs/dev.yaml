geojson:
  path: "data/buildings.geojson"
  default_height_m: 15.0
  max_buildings: 200
  mesh_output_dir: "world"

coordinates:
  origin_lat: null
  origin_lon: null

occupancy:
  resolution_m: 8.0

simulation:
  timestep: 0.02
  max_velocity: 8.0
  max_yaw_rate: 1.5
  drone_mass: 1.5
  drone_size: 0.4
  safe_altitude_min: 5.0
  safe_altitude_max: 150.0
  ground_size_margin: 50.0
  gui: false

environment:
  max_episode_steps: 300
  goal_tolerance_m: 3.0
  occupancy_grid_size: 16
  observation_image_size: 32
  reward:
    progress_scale: 2.0
    goal_bonus: 100.0
    waypoint_scale: 0.5
    collision_penalty: 50.0
    boundary_penalty: 30.0
    time_penalty: 0.05
    energy_penalty_scale: 0.01
    smoothness_penalty_scale: 0.1
    altitude_change_penalty: 0.05

planner:
  grid_resolution_m: 8.0
  flight_altitude_m: 40.0
  clearance_m: 3.0

dreamer:
  seed: 42
  device: "cpu"
  batch_size: 4
  batch_length: 16
  train_ratio: 4
  pretrain: 5
  eval_every: 20
  log_every: 5
  checkpoint_every: 50
  imagination_horizon: 8
  gamma: 0.997
  lambda_: 0.95
  model_lr: 3.0e-4
  actor_lr: 8.0e-5
  critic_lr: 8.0e-5
  grad_clip: 100.0
  replay_capacity: 10000
  prioritized_alpha: 0.6
  prioritized_beta: 0.4
  stoch_dim: 16
  deter_dim: 128
  hidden_dim: 256
  actor_entropy: 3.0e-4

training:
  total_steps: 500
  eval_episodes: 2
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  resume: false
  resume_checkpoint: null

evaluation:
  num_episodes: 3
  render: false
  output_dir: "logs/eval"

visualization:
  output_dir: "logs/visualizations"
  show_gui: false
